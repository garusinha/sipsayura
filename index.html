<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sipsayura Elite - V39 Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --p: #4f46e5; --s: #10b981; --d: #f43f5e; --y: #eab308; --dk: #0f172a; --bg: #f8fafc; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--dk); font-size: 13px; -webkit-tap-highlight-color: transparent; }
      #login-screen { position: fixed; inset: 0; background: var(--dk); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; text-align: center; }
      header { background: linear-gradient(135deg, var(--dk) 0%, #1e293b 100%); color: white; padding: 35px 20px; text-align: center; border-radius: 0 0 30px 30px; }
      nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 8px; display: flex; justify-content: space-around; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
      .nav-btn { padding: 10px 15px; border-radius: 12px; font-weight: 700; border: none; background: transparent; color: #64748b; font-size: 12px; cursor: pointer; }
      .nav-btn.active { background: var(--p); color: white; }
      .container { padding: 15px; max-width: 500px; margin: auto; padding-bottom: 100px; }
      .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #f1f5f9; }
      .grade-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; }
      input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 13px; margin-bottom: 12px; box-sizing: border-box; }
      .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
      .btn-p { background: var(--p); color: white; }
      .btn-s { background: var(--s); color: white; }
      .btn-dk { background: var(--dk); color: white; }
      .std-row { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: white; border-radius: 16px; margin-bottom: 8px; border: 1px solid #f1f5f9; }
      .badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
      .badge-paid { background: #dcfce7; color: #166534; }
      .badge-day { background: #fef9c3; color: #854d0e; }
      .badge-arr { background: #fae8ff; color: #701a75; }
      .badge-due { background: #fee2e2; color: #991b1b; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 3000; padding: 15px; backdrop-filter: blur(8px); overflow-y: auto; }
      .modal { background: white; max-width: 480px; margin: 10px auto; border-radius: 24px; padding: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
    </style>
  </head>
  <body>

    <div id="login-screen">
      <div class="login-box" style="max-width:320px; width:100%;">
        <span style="font-size: 50px;">🔐</span>
        <h1 style="margin:10px 0 5px; color:white;">Sipsayura Elite</h1>
        <p style="font-size:10px; opacity:0.6; color:white;">V39 FINANCE MASTER</p>
        <input type="password" id="master-pin" style="background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); color:white; text-align:center; font-size:24px; letter-spacing:10px;" placeholder="••••" maxlength="4">
        <button class="btn btn-p" onclick="checkLogin()">Unlock System</button>
      </div>
    </div>

    <div id="app-content" style="display: none;">
        <header><span class="icon">🎓</span><h1 style="margin:0;">SIPSAYURA <span style="color: #818cf8">ELITE</span></h1></header>
        <nav id="app-nav" style="display: none">
          <button class="nav-btn active" onclick="setTab('att', this)">Classroom</button>
          <button class="nav-btn" onclick="setTab('reg', this)">Enroll</button>
          <button class="nav-btn" onclick="setTab('set', this)">Admin</button>
        </nav>

        <div class="container">
          <div id="v-grades">
            <h2 style="font-size: 14px; margin-bottom: 15px; color: #64748b;">Select Grade</h2>
            <div id="dom-grades" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px"></div>
            <button class="btn btn-dk" style="margin-top:25px;" onclick="addNewGrade()">+ Create New Class</button>
          </div>

          <div id="v-subs" style="display: none">
            <div style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 20px;">
                <h2 id="lbl-grade" style="margin:0"></h2>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--p); font-weight:800;">Back</button>
            </div>
            <div id="dom-subs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px"></div>
          </div>

          <div id="v-dash" style="display: none">
            <div id="tab-att">
              <div class="card" style="padding: 12px;">
                <input type="date" id="att-date" onchange="render()" />
                <input type="text" id="att-q" placeholder="Search student name..." oninput="render()" style="margin-bottom:0" />
              </div>
              <div id="sch-notice" style="margin-bottom:10px; font-size:11px; color:var(--p); font-weight:bold;"></div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px;">
                <button class="btn btn-dk" onclick="openSummary()">📊 Pro Summary</button>
                <button class="btn btn-s" onclick="save()">✔️ Cloud Sync</button>
              </div>
              <div id="dom-list"></div>
            </div>

            <div id="tab-reg" style="display: none">
              <div class="card">
                <h3>Enroll Student</h3>
                <input type="text" id="reg-n" placeholder="Full Name" />
                <input type="tel" id="reg-ph" placeholder="Parent WhatsApp" maxlength="10"/>
                <button class="btn btn-p" onclick="register()">Confirm Enrollment</button>
              </div>
            </div>

            <div id="tab-set" style="display: none">
              <div class="card"><h3>Class Schedule</h3>
                <div style="background:#f1f5f9; padding:15px; border-radius:15px; margin-bottom:15px;">
                    <select id="sch-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
                    <input type="time" id="sch-time"><input type="number" id="sch-dur" placeholder="Duration (Hrs)">
                    <button class="btn btn-p" onclick="updateSchedule()">Save Schedule</button>
                </div>
              </div>
              <div class="card"><h3>Monthly Ledger</h3>
                <input type="month" id="ledger-month">
                <button class="btn btn-dk" onclick="generateMonthlySummary()">Download Monthly Report</button>
              </div>
              <button class="btn btn-s" style="margin-bottom:10px" onclick="exportData()">Backup JSON</button>
              <button class="btn btn-dk" onclick="location.reload()">Logout</button>
            </div>
          </div>
        </div>
    </div>

    <div id="p-overlay" class="overlay"><div class="modal" id="p-content"></div></div>
    <div id="s-overlay" class="overlay">
      <div class="modal" style="max-width: 650px;">
        <div id="sum-area"></div><div id="sum-fin"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-p" onclick="printReport()">Download PDF</button>
            <button class="btn btn-dk" onclick="closeOverlays()">Close</button>
        </div>
      </div>
    </div>

    <script>
      function checkLogin() { if(document.getElementById("master-pin").value === "9988") { sessionStorage.setItem("auth_sip", "true"); document.getElementById("login-screen").style.display = "none"; document.getElementById("app-content").style.display = "block"; initApp(); } else { alert("Denied"); } }
      if(sessionStorage.getItem("auth_sip") === "true") { document.getElementById("login-screen").style.display = "none"; document.getElementById("app-content").style.display = "block"; }

      const firebaseConfig = { apiKey: "AIzaSyARz6yYnI8d2KR6wWl--PT6nEnVikSplms", authDomain: "sipsayura-96757.firebaseapp.com", databaseURL: "https://sipsayura-96757-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "sipsayura-96757", storageBucket: "sipsayura-96757.firebasestorage.app", messagingSenderId: "148140063507", appId: "1:148140063507:web:41a1046fa7aea4885238e6" };
      firebase.initializeApp(firebaseConfig);
      const rdb = firebase.database();
      let db = { students: [], att: {}, grades: {}, subs: ["MATH","SCI","SIN","ENG"], fees: {}, schedules: {} };
      let cg = "", cs = "";

      function initApp() { rdb.ref('sip_v28').on('value', (s) => { if(s.val()) { db = s.val(); render(); refreshUI(); } }); }
      initApp();
      const save = () => rdb.ref('sip_v28').set(db);

      function refreshUI() { if(document.getElementById('v-grades').style.display !== 'none') initGrades(); if(document.getElementById('v-subs').style.display !== 'none') initSubs(); if(cs && cg) loadScheduleUI(); }
      function initGrades() { const d = document.getElementById("dom-grades"); d.innerHTML = ""; Object.keys(db.grades || {}).forEach(g => { d.innerHTML += `<div class="grade-card" onclick="selG('${g}')"><h3>Grade ${g}</h3><small>Fee: ${db.grades[g].mFee}</small></div>`; }); }
      function selG(g) { cg = g; document.getElementById("lbl-grade").innerText = "Grade " + g; showV("v-subs"); initSubs(); }
      function initSubs() { const d = document.getElementById("dom-subs"); d.innerHTML = ""; (db.subs || []).forEach(s => { d.innerHTML += `<div class="grade-card" onclick="enter('${s}')"><h3>${s}</h3></div>`; }); }
      function enter(s) { cs = s; showV("v-dash"); document.getElementById("app-nav").style.display = "flex"; setTab('att', document.querySelector(".nav-btn")); }
      function showV(id) { ["v-grades", "v-subs", "v-dash"].forEach(v => document.getElementById(v).style.display = "none"); document.getElementById(id).style.display = "block"; }

      function setTab(t, el) {
        if(t === 'set' && prompt("Admin PIN:") !== "2705") return;
        ["att", "reg", "set"].forEach(i => document.getElementById("tab-" + i).style.display = "none");
        document.getElementById("tab-" + t).style.display = "block";
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        if (el) el.classList.add("active");
        render();
      }

      function loadScheduleUI() { const s = db.schedules?.[`${cs}_${cg}`] || { day: 'Monday', time: '08:30', dur: '2' }; document.getElementById("sch-day").value = s.day; document.getElementById("sch-time").value = s.time; document.getElementById("sch-dur").value = s.dur; }
      function updateSchedule() { if(!db.schedules) db.schedules = {}; db.schedules[`${cs}_${cg}`] = { day: document.getElementById("sch-day").value, time: document.getElementById("sch-time").value, dur: document.getElementById("sch-dur").value }; save(); alert("Updated!"); }

      function getArrears(sid, currentKey, month) {
          let total = 0;
          Object.keys(db.att || {}).forEach(k => {
              if(k.startsWith(`${cs}_${cg}_${month}`) && k !== currentKey) {
                  const wasP = db.att[k].p.includes(sid);
                  const paidD = db.att[k].daily?.[sid] > 0;
                  const paidM = db.fees?.[month]?.[sid]?.paid;
                  if(wasP && !paidD && !paidM) {
                      let alreadySettled = false;
                      Object.keys(db.att || {}).forEach(laterK => { if(db.att[laterK].settlements?.[sid]?.includes(k)) alreadySettled = true; });
                      if(!alreadySettled) total += 250;
                  }
              }
          });
          return total;
      }

      function render() {
        const dateInput = document.getElementById("att-date").value || new Date().toISOString().split('T')[0];
        document.getElementById("att-date").value = dateInput;
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const selectedDayName = days[new Date(dateInput).getDay()];
        const sch = db.schedules?.[`${cs}_${cg}`] || {};
        const q = document.getElementById("att-q").value.toLowerCase();
        const month = dateInput.slice(0, 7);
        const dom = document.getElementById("dom-list"); dom.innerHTML = "";

        if(sch.day !== selectedDayName) { document.getElementById("sch-notice").innerText = `⚠️ Selected date is ${selectedDayName}. Class is scheduled for ${sch.day}.`; return; }
        else { document.getElementById("sch-notice").innerText = `✅ Scheduled Class: ${sch.time}`; }

        const list = (db.students || []).filter(s => s.g === cg && s.s === cs && s.name.toLowerCase().includes(q));
        list.forEach(s => {
          const key = `${cs}_${cg}_${dateInput}`;
          const isP = db.att?.[key]?.p?.includes(s.id);
          const isPaidMonth = db.fees?.[month]?.[s.id]?.paid;
          const isPaidDayToday = db.att?.[key]?.daily?.[s.id] > 0;
          const isSettlementToday = db.att?.[key]?.settlements?.[s.id]?.length > 0;
          const arrAmt = getArrears(s.id, key, month);

          let statusLabel = `<span class="badge badge-due">PENDING</span>`;
          if(isPaidMonth) statusLabel = `<span class="badge badge-paid">MONTHLY DONE</span>`;
          else if(isPaidDayToday) statusLabel = `<span class="badge badge-day">TODAY PAID</span>`;
          if(isSettlementToday) statusLabel += ` <span class="badge badge-arr">ARREARS SETTLED</span>`;

          dom.innerHTML += `
            <div class="std-row">
                <div onclick="openProfile('${s.id}')" style="flex:1">
                    <b style="color: ${arrAmt > 0 ? 'var(--d)' : 'var(--dk)'}">${s.name.toUpperCase()}</b>
                    ${arrAmt > 0 ? `<br><small style="color:red; font-weight:800;">ARREARS: Rs.${arrAmt}</small>` : ''}
                    <br>${statusLabel}
                </div>
                <input type="checkbox" style="width:22px; height:22px" ${isP ? 'checked' : ''} onchange="markAtt('${s.id}', this.checked)">
            </div>`;
        });
      }

      function openSummary() {
        const date = document.getElementById("att-date").value;
        const key = `${cs}_${cg}_${date}`;
        const attData = db.att?.[key] || { p: [], daily: {}, settlements: {} };
        const mFee = db.grades[cg].mFee;
        let total = 0;

        let html = `<div id="pdf-content"><div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:15px;"><h2 style="margin:0">SIPSAYURA ELITE - TEACHER SLIP</h2><p>${cs} | GRADE ${cg} | ${date}</p></div>`;
        html += `<table id="sum-table" style="width:100%; border-collapse:collapse; margin-bottom:20px;"><tr style="background:#eee;"><th>STUDENT</th><th style="text-align:center">ATTENDANCE</th><th style="text-align:right">PAYMENT</th></tr>`;
        
        (db.students || []).filter(s => s.g === cg && s.s === cs).forEach(s => {
            const isP = attData.p.includes(s.id);
            const isPaidMonth = db.fees?.[date.slice(0, 7)]?.[s.id]?.paid;
            const dayAmt = attData.daily?.[s.id] || 0;
            const setAmt = (attData.settlements?.[s.id]?.length || 0) * 250;
            const rowAmt = (isPaidMonth ? mFee : 0) + dayAmt + setAmt;
            if(isP || rowAmt > 0) {
                total += rowAmt;
                html += `<tr style="border-bottom:1px solid #ddd;"><td>${s.name.toUpperCase()}</td><td align="center">${isP?'PRESENT':'ABSENT'}</td><td align="right">Rs.${rowAmt}</td></tr>`;
            }
        });

        html += `</table>`;
        document.getElementById("sum-area").innerHTML = html;
        document.getElementById("sum-fin").innerHTML = `<div style="background:#0f172a; color:white; padding:15px; border-radius:10px; margin-top:10px;"><b>TOTAL COLLECTED: Rs. ${total}</b><br><small>Teacher (80%): Rs. ${(total*0.8).toFixed(0)} | Institute (20%): Rs. ${(total*0.2).toFixed(0)}</small></div>`;
        document.getElementById("s-overlay").style.display = "block";
      }

      function printReport() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text(`SIPSAYURA ELITE - ${cs} G${cg} - ${document.getElementById("att-date").value}`, 14, 15);
        doc.autoTable({ html: '#sum-table', startY: 25, headStyles: {fillColor:[15, 23, 42]} });
        doc.text(document.getElementById("sum-fin").innerText, 14, doc.lastAutoTable.finalY + 15);
        doc.save(`Slip_${cs}_${document.getElementById("att-date").value}.pdf`);
      }

      function generateMonthlySummary() {
          const month = document.getElementById("ledger-month").value;
          if(!month) return alert("Select Month");
          const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4');
          doc.text(`MONTHLY MASTER LEDGER: ${month} - ${cs} G${cg}`, 14, 15);
          
          let tableData = []; let totalFull = 0;
          (db.students || []).filter(s => s.g === cg && s.s === cs).forEach(s => {
              let studCol = 0; let studAtt = 0;
              // Calc Attendance
              Object.keys(db.att).forEach(k => { if(k.startsWith(`${cs}_${cg}_${month}`) && db.att[k].p.includes(s.id)) studAtt++; });
              // Calc Payments
              const mPaid = db.fees?.[month]?.[s.id]?.paid ? db.grades[cg].mFee : 0;
              let dPaid = 0; let sPaid = 0;
              Object.keys(db.att).forEach(k => { if(k.startsWith(`${cs}_${cg}_${month}`)) { dPaid += (db.att[k].daily?.[s.id] || 0); sPaid += (db.att[k].settlements?.[s.id]?.length || 0) * 250; } });
              
              studCol = mPaid + dPaid + sPaid;
              if(studAtt > 0 || studCol > 0) {
                  const inst = studCol * 0.2; const teach = studCol * 0.8;
                  tableData.push([s.name.toUpperCase(), studAtt, `Rs.${studCol}`, `Rs.${inst.toFixed(0)}`, `Rs.${teach.toFixed(0)}`]);
                  totalFull += studCol;
              }
          });

          doc.autoTable({
              head: [['Student Name', 'Days Attended', 'Total Collection', 'Institute (20%)', 'Teacher (80%)']],
              body: tableData,
              startY: 25,
              foot: [['GRAND TOTAL', '', `Rs.${totalFull}`, `Rs.${(totalFull*0.2).toFixed(0)}`, `Rs.${(totalFull*0.8).toFixed(0)}`]],
              headStyles: {fillColor:[15, 23, 42]}
          });
          doc.save(`Monthly_Summary_${cs}_${month}.pdf`);
      }

      function openProfile(id) {
        const s = db.students.find(x => x.id === id);
        const date = document.getElementById("att-date").value;
        const month = date.slice(0, 7);
        const key = `${cs}_${cg}_${date}`;
        const isPaidMonth = db.fees?.[month]?.[id]?.paid;
        const isPaidDayToday = db.att?.[key]?.daily?.[id] > 0;
        const arrAmt = getArrears(id, key, month);

        document.getElementById("p-content").innerHTML = `
          <h3 style="margin:0">${s.name.toUpperCase()}</h3>
          <div class="card" style="margin-top:10px;"><small>MONTHLY PLAN</small><br><b>${isPaidMonth?'PAID':'PENDING'}</b><br><button class="btn btn-p" onclick="payMonthly('${id}', ${!isPaidMonth})">Toggle Payment</button></div>
          <div class="card"><small>DAILY FEE</small><br><b>${isPaidDayToday?'PAID':'NOT PAID'}</b><br><button class="btn btn-dk" onclick="payDaily('${id}', 250)">Pay 250</button></div>
          ${arrAmt > 0 ? `<div class="card" style="background:#fff1f2;"><small>ARREARS</small><br><b style="color:red;">Rs.${arrAmt}</b><br><button class="btn btn-dk" style="background:red;" onclick="settleArrears('${id}', ${arrAmt})">Settle Now</button></div>` : ''}
          <button class="btn btn-dk" style="background:#f1f5f9; color:#000" onclick="closeOverlays()">Close</button>`;
        document.getElementById("p-overlay").style.display = "block";
      }

      function settleArrears(sid, amt) {
          const key = `${cs}_${cg}_${document.getElementById("att-date").value}`;
          const month = key.split('_')[2].slice(0, 7);
          if(!db.att[key].settlements) db.att[key].settlements = {};
          let settledDates = [];
          Object.keys(db.att).forEach(k => { if(k.startsWith(`${cs}_${cg}_${month}`) && k !== key) { if(db.att[k].p.includes(sid) && !(db.att[k].daily?.[sid] > 0) && !db.fees?.[month]?.[sid]?.paid) settledDates.push(k); } });
          db.att[key].settlements[sid] = settledDates;
          save(); closeOverlays();
      }

      function payDaily(id, amt) { const k = `${cs}_${cg}_${document.getElementById("att-date").value}`; if(!db.att[k]) db.att[k] = { p: [] }; if(!db.att[k].daily) db.att[k].daily = {}; db.att[k].daily[id] = amt; save(); openProfile(id); }
      function payMonthly(id, st) { const m = document.getElementById("att-date").value.slice(0, 7); if(!db.fees) db.fees = {}; if(!db.fees[m]) db.fees[m] = {}; db.fees[m][id] = { paid: st, date: document.getElementById("att-date").value }; save(); openProfile(id); }
      function markAtt(id, val) { const k = `${cs}_${cg}_${document.getElementById("att-date").value}`; if(!db.att[k]) db.att[k] = { p: [] }; if(val) db.att[k].p.push(id); else db.att[k].p = db.att[k].p.filter(i => i !== id); save(); render(); }
      function register() { const nI = document.getElementById("reg-n"); const pI = document.getElementById("reg-ph"); if(!nI.value || !pI.value) return; if(!db.students) db.students = []; db.students.push({ id: `S-${Date.now().toString().slice(-4)}`, name: nI.value, ph: pI.value, g: cg, s: cs, joined: new Date().toLocaleDateString() }); save(); nI.value = ""; pI.value = ""; setTab('att'); }
      function addNewGrade() { const n = prompt("Grade:"); const f = prompt("Fee:", "1000"); if(n) { if(!db.grades) db.grades = {}; db.grades[n] = { mFee: parseInt(f) }; save(); } }
      function closeOverlays() { document.getElementById("p-overlay").style.display="none"; document.getElementById("s-overlay").style.display="none"; render(); }
      function exportData() { const b = new Blob([JSON.stringify(db)], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Sipsayura_Backup.json`; a.click(); }
    </script>
  </body>
</html>
