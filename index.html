<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sipsayura Elite - V36.4 Fixed</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
:root { --p:#4f46e5; --s:#10b981; --d:#f43f5e; --dk:#0f172a; --bg:#f8fafc; }
body { font-family:sans-serif; margin:0; background:var(--bg); font-size:13px; }
.container { padding:15px; max-width:500px; margin:auto; }
.btn { padding:10px; border:none; border-radius:10px; font-weight:700; cursor:pointer; }
.btn-p{background:var(--p);color:white;}
.btn-dk{background:var(--dk);color:white;}
.badge{font-size:9px;padding:3px 6px;border-radius:6px;font-weight:800;}
.badge-paid{background:#dcfce7;color:#166534;}
.badge-day{background:#fef9c3;color:#854d0e;}
.badge-due{background:#fee2e2;color:#991b1b;}
.lock-notice{padding:8px;border-radius:8px;margin-bottom:10px;font-size:11px;}
</style>
</head>

<body>

<div class="container">

<input type="date" id="att-date" onchange="render()" />
<div id="time-lock-status"></div>
<div id="dom-list"></div>

<button class="btn btn-p" onclick="openSummary()">Open Summary</button>

</div>

<script>
// ---------- Firebase ----------
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

let db = { students: [], att:{}, grades:{ "10":{mFee:1000,dFee:250}}, fees:{}, schedules:{} };
let cg="10"; let cs="MATH";

// ---------- SAVE ----------
function save(){ rdb.ref('sip_v36').set(db); }

// ---------- LOCK ----------
function checkAttendanceLock(){
  return { locked:false, msg:"Attendance Open ✅" };
}

// ---------- RENDER ----------
function render(){
  const date=document.getElementById("att-date").value||new Date().toISOString().split('T')[0];
  document.getElementById("att-date").value=date;

  const key=`${cs}_${cg}_${date}`;
  const list=db.students.filter(s=>s.g===cg&&s.s===cs);
  const dom=document.getElementById("dom-list");
  dom.innerHTML="";

  const lock=checkAttendanceLock();

  document.getElementById("time-lock-status").innerHTML=
  `<div class="lock-notice" style="background:${lock.locked?'#fee2e2':'#dcfce7'}">
  ${lock.msg}</div>`;

  list.forEach(s=>{
    const isP=db.att?.[key]?.p?.includes(s.id);
    const month=date.slice(0,7);
    const isPaidMonth=db.fees?.[month]?.[s.id]?.paid;
    const isPaidDay=db.att?.[key]?.daily?.[s.id]>0;

    let badge=`<span class="badge badge-due">ABSENT</span>`;
    if(isPaidMonth) badge=`<span class="badge badge-paid">MONTHLY PAID</span>`;
    else if(isPaidDay) badge=`<span class="badge badge-day">DAILY PAID</span>`;
    else if(isP) badge=`<span class="badge" style="background:#e0e7ff;color:#3730a3;">PRESENT (UNPAID)</span>`;

    dom.innerHTML+=`
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding:10px;background:white;border-radius:10px;">
      <div><b>${s.name}</b><br>${badge}</div>
      <input type="checkbox"
      ${isP?'checked':''}
      ${lock.locked?'disabled':''}
      onchange="markAtt('${s.id}',this.checked)">
    </div>`;
  });
}

// ---------- MARK ----------
function markAtt(id,val){
  const date=document.getElementById("att-date").value;
  const key=`${cs}_${cg}_${date}`;
  if(!db.att[key]) db.att[key]={p:[],daily:{}};
  if(val){
    if(!db.att[key].p.includes(id)) db.att[key].p.push(id);
  }else{
    db.att[key].p=db.att[key].p.filter(i=>i!==id);
  }
  save(); render();
}

// ---------- SUMMARY FIXED ----------
function openSummary(){
  const date=document.getElementById("att-date").value;
  const key=`${cs}_${cg}_${date}`;
  const attData=db.att?.[key]||{p:[],daily:{}};
  const mFee=db.grades[cg].mFee;
  let html="<h3>Teacher Summary</h3>";
  html+="<table border='1' width='100%'><tr><th>Name</th><th>Status</th><th>Amount</th></tr>";

  db.students.filter(s=>s.g===cg&&s.s===cs).forEach(s=>{
    const month=date.slice(0,7);
    const isPaidMonth=db.fees?.[month]?.[s.id]?.paid;
    const dayAmt=attData.daily?.[s.id]||0;
    const isPresent=attData.p.includes(s.id);

    let status="",amt=0,color="black";

    if(isPaidMonth){
      status="MONTHLY PAID"; amt=mFee;
    }
    else if(dayAmt>0){
      status="DAILY PAID"; amt=dayAmt;
    }
    else if(isPresent){
      status="PRESENT (NOT PAID)";
      color="orange";
    }
    else{
      status="ABSENT";
      color="red";
    }

    html+=`<tr style="color:${color}">
      <td>${s.name}</td>
      <td>${status}</td>
      <td>Rs.${amt}</td>
    </tr>`;
  });

  html+="</table>";
  const w=window.open();
  w.document.write(html);
}

// ---------- REGISTER SAFE ID ----------
function registerStudent(name){
  db.students.push({
    id:`S-${Date.now()}`,  // FIXED UNIQUE ID
    name:name,
    g:cg,
    s:cs
  });
  save(); render();
}

// Sample Data
db.students=[
  {id:"S-1",name:"Kamal",g:"10",s:"MATH"},
  {id:"S-2",name:"Nimal",g:"10",s:"MATH"}
];

render();
</script>
</body>
</html>
