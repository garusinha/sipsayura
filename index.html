<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sipsayura Elite - V36 Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --p: #4f46e5; --s: #10b981; --d: #f43f5e; --y: #eab308; --dk: #0f172a; --bg: #f8fafc; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--dk); font-size: 13px; -webkit-tap-highlight-color: transparent; }
      #login-screen { position: fixed; inset: 0; background: var(--dk); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; color: white; text-align: center; }
      header { background: linear-gradient(135deg, var(--dk) 0%, #1e293b 100%); color: white; padding: 35px 20px; text-align: center; border-radius: 0 0 30px 30px; }
      nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 8px; display: flex; justify-content: space-around; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
      .nav-btn { padding: 10px 15px; border-radius: 12px; font-weight: 700; border: none; background: transparent; color: #64748b; font-size: 11px; cursor: pointer; }
      .nav-btn.active { background: var(--p); color: white; }
      .container { padding: 15px; max-width: 500px; margin: auto; padding-bottom: 100px; }
      .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #f1f5f9; }
      .grade-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; }
      input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 13px; margin-bottom: 12px; box-sizing: border-box; }
      .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
      .btn-p { background: var(--p); color: white; }
      .btn-s { background: var(--s); color: white; }
      .btn-dk { background: var(--dk); color: white; }
      .std-row { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: white; border-radius: 16px; margin-bottom: 8px; border: 1px solid #f1f5f9; }
      .badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
      .badge-paid { background: #dcfce7; color: #166534; }
      .badge-day { background: #fef9c3; color: #854d0e; }
      .badge-due { background: #fee2e2; color: #991b1b; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 3000; padding: 15px; backdrop-filter: blur(8px); overflow-y: auto; }
      .modal { background: white; max-width: 480px; margin: 10px auto; border-radius: 24px; padding: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
      .lock-notice { background: #fff1f2; color: #991b1b; padding: 10px; border-radius: 10px; font-size: 11px; margin-bottom: 10px; text-align: center; border: 1px solid #fecdd3; }
    </style>
  </head>
  <body>

    <div id="login-screen">
      <div class="login-box" style="max-width:320px; width:100%;">
        <span style="font-size: 50px;">💎</span>
        <h1 style="margin:10px 0 5px; color:white;">Sipsayura Elite</h1>
        <p style="font-size:10px; opacity:0.6; color:white;">V36 ADVANCED MASTER</p>
        <input type="password" id="master-pin" style="background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); color:white; text-align:center; font-size:24px; letter-spacing:10px;" placeholder="••••" maxlength="4">
        <button class="btn btn-p" onclick="checkLogin()">Unlock System</button>
      </div>
    </div>

    <div id="app-content" style="display: none;">
        <header><span class="icon">🎓</span><h1 style="margin:0;">SIPSAYURA <span style="color: #818cf8">ELITE</span></h1></header>
        <nav id="app-nav" style="display: none">
          <button class="nav-btn active" onclick="setTab('att', this)">Classroom</button>
          <button class="nav-btn" onclick="setTab('sch', this)">Schedule</button>
          <button class="nav-btn" onclick="setTab('rep', this)">Monthly</button>
          <button class="nav-btn" onclick="setTab('reg', this)">Enroll</button>
          <button class="nav-btn" onclick="setTab('set', this)">Admin</button>
        </nav>

        <div class="container">
          <div id="v-grades">
            <h2 style="font-size: 14px; margin-bottom: 15px; color: #64748b;">Select Grade</h2>
            <div id="dom-grades" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px"></div>
            <button class="btn btn-dk" style="margin-top:25px;" onclick="addNewGrade()">+ Create New Class</button>
          </div>

          <div id="v-subs" style="display: none">
            <div style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 20px;">
                <h2 id="lbl-grade" style="margin:0"></h2>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--p); font-weight:800;">Back</button>
            </div>
            <div id="dom-subs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px"></div>
          </div>

          <div id="v-dash" style="display: none">
            <div id="tab-att">
              <div id="time-lock-status"></div>
              <div class="card" style="padding: 12px;">
                <input type="date" id="att-date" onchange="render()" />
                <input type="text" id="att-q" placeholder="Search student name..." oninput="render()" style="margin-bottom:0" />
              </div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px;">
                <button class="btn btn-dk" onclick="openSummary()">📊 Day Summary</button>
                <button class="btn btn-s" onclick="save()">✔️ Sync Cloud</button>
              </div>
              <div id="dom-list"></div>
            </div>

            <div id="tab-sch" style="display: none">
                <div class="card">
                    <h3>Set Class Schedule</h3>
                    <p style="font-size:11px; color:#64748b;">Attendance is only enabled within ±1 hour of this time.</p>
                    <label>Class Day</label>
                    <select id="sch-day">
                        <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option><option value="Friday">Friday</option><option value="Saturday">Saturday</option><option value="Sunday">Sunday</option>
                    </select>
                    <label>Start Time</label><input type="time" id="sch-start" value="08:00">
                    <label>Duration (Hours)</label><input type="number" id="sch-dur" value="2" step="0.5">
                    <button class="btn btn-p" onclick="saveSchedule()">Update Schedule</button>
                </div>
            </div>

            <div id="tab-rep" style="display: none">
                <div class="card">
                    <h3>Monthly Master Report</h3>
                    <input type="month" id="rep-month" onchange="renderMonthlyReport()">
                    <div id="monthly-report-area" style="overflow-x:auto;"></div>
                </div>
            </div>

            <div id="tab-reg" style="display: none">
              <div class="card">
                <h3>Enroll Student</h3>
                <input type="text" id="reg-n" placeholder="Full Name" />
                <input type="tel" id="reg-ph" placeholder="Parent WhatsApp" maxlength="10"/>
                <button class="btn btn-p" onclick="register()">Confirm Enrollment</button>
              </div>
            </div>

            <div id="tab-set" style="display: none">
              <div class="card"><h3>Admin</h3></div>
              <button class="btn btn-s" style="margin-bottom:10px" onclick="exportData()">Backup Data</button>
              <button class="btn btn-dk" onclick="location.reload()">Logout</button>
            </div>
          </div>
        </div>
    </div>

    <div id="p-overlay" class="overlay"><div class="modal" id="p-content"></div></div>
    <div id="s-overlay" class="overlay">
      <div class="modal" style="max-width: 650px;">
        <h3 style="margin-top:0;">Teacher's Daily Summary</h3>
        <div id="sum-area"></div><div id="sum-fin"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-p" onclick="printReport()">PDF Export</button>
            <button class="btn btn-dk" onclick="closeOverlays()">Close</button>
        </div>
      </div>
    </div>

    <script>
      function checkLogin() {
        if(document.getElementById("master-pin").value === "9988") {
            sessionStorage.setItem("auth_sip", "true");
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app-content").style.display = "block";
            initApp();
        } else { alert("Denied"); }
      }
      if(sessionStorage.getItem("auth_sip") === "true") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
      }

      const firebaseConfig = {
        apiKey: "AIzaSyARz6yYnI8d2KR6wWl--PT6nEnVikSplms",
        authDomain: "sipsayura-96757.firebaseapp.com",
        databaseURL: "https://sipsayura-96757-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sipsayura-96757",
        storageBucket: "sipsayura-96757.firebasestorage.app",
        messagingSenderId: "148140063507",
        appId: "1:148140063507:web:41a1046fa7aea4885238e6"
      };
      firebase.initializeApp(firebaseConfig);
      const rdb = firebase.database();
      let db = { students: [], att: {}, grades: {}, subs: ["MATH","SCI","SIN","ENG"], fees: {}, schedules: {} };
      let cg = "", cs = "";

      function initApp() { rdb.ref('sip_v36').on('value', (s) => { if(s.val()) { db = s.val(); render(); refreshUI(); } }); }
      initApp();
      const save = () => rdb.ref('sip_v36').set(db);

      function refreshUI() {
        if(document.getElementById('v-grades').style.display !== 'none') initGrades();
        if(document.getElementById('v-subs').style.display !== 'none') initSubs();
      }

      function initGrades() {
        const d = document.getElementById("dom-grades"); d.innerHTML = "";
        Object.keys(db.grades || {}).forEach(g => {
          d.innerHTML += `<div class="grade-card" onclick="selG('${g}')"><h3>Grade ${g}</h3><small>Fee: ${db.grades[g].mFee} | Daily: ${db.grades[g].dFee || 250}</small></div>`;
        });
      }

      function selG(g) { cg = g; document.getElementById("lbl-grade").innerText = "Grade " + g; showV("v-subs"); initSubs(); }
      function initSubs() {
        const d = document.getElementById("dom-subs"); d.innerHTML = "";
        (db.subs || []).forEach(s => { d.innerHTML += `<div class="grade-card" onclick="enter('${s}')"><h3>${s}</h3></div>`; });
      }

      function enter(s) { cs = s; showV("v-dash"); document.getElementById("app-nav").style.display = "flex"; setTab('att', document.querySelector(".nav-btn")); }
      function showV(id) { ["v-grades", "v-subs", "v-dash"].forEach(v => document.getElementById(v).style.display = "none"); document.getElementById(id).style.display = "block"; }

      function setTab(t, el) {
        if(t === 'set' && prompt("Admin PIN:") !== "2705") return;
        ["att", "reg", "set", "sch", "rep"].forEach(i => document.getElementById("tab-" + i).style.display = "none");
        document.getElementById("tab-" + t).style.display = "block";
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        if (el) el.classList.add("active"); 
        if(t === 'rep') renderMonthlyReport();
        if(t === 'sch') loadSchedule();
        render();
      }

      // --- LOGIC: TIME LOCK ---
      function checkAttendanceLock() {
        const sched = db.schedules?.[`${cg}_${cs}`];
        if(!sched) return { locked: false, msg: "No schedule set." };
        
        const now = new Date();
        const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        const todayName = days[now.getDay()];
        
        const selectedDate = document.getElementById("att-date").value;
        const isToday = selectedDate === now.toISOString().split('T')[0];

        if(!isToday) return { locked: false, msg: "Viewing past/future date." };
        if(todayName !== sched.day) return { locked: true, msg: `Locked: Class is scheduled for ${sched.day}s.` };

        const [h, m] = sched.start.split(':');
        const startTime = new Date(); startTime.setHours(h, m, 0);
        const endTime = new Date(startTime.getTime() + (sched.dur * 60 * 60 * 1000));
        
        const lockStart = new Date(startTime.getTime() - (60 * 60 * 1000)); // -1 Hour
        const lockEnd = new Date(endTime.getTime() + (60 * 60 * 1000)); // +1 Hour

        if(now >= lockStart && now <= lockEnd) return { locked: false, msg: "Attendance Open ✅" };
        return { locked: true, msg: "Locked: Attendance only allowed during class time (±1hr)." };
      }

      // --- LOGIC: ARREARS ---
      function getStudentStats(id, month) {
        let presentDays = 0, paidDays = 0, totalDailyPaid = 0;
        const dFee = db.grades[cg].dFee || 250;

        Object.keys(db.att || {}).forEach(k => {
            if(k.startsWith(`${cs}_${cg}_${month}`)) {
                if(db.att[k].p.includes(id)) {
                    presentDays++;
                    if(db.att[k].daily?.[id] > 0) {
                        paidDays++;
                        totalDailyPaid += db.att[k].daily[id];
                    }
                }
            }
        });
        const arrears = (presentDays - paidDays) * dFee;
        return { presentDays, paidDays, arrears, totalDailyPaid };
      }

      function render() {
        const date = document.getElementById("att-date").value || new Date().toISOString().split('T')[0];
        document.getElementById("att-date").value = date;
        const lock = checkAttendanceLock();
        document.getElementById("time-lock-status").innerHTML = `<div class="lock-notice" style="background:${lock.locked?'#fff1f2':'#f0fdf4'}; color:${lock.locked?'#991b1b':'#166534'}">${lock.msg}</div>`;

        const q = document.getElementById("att-q").value.toLowerCase();
        const month = date.slice(0, 7);
        const list = (db.students || []).filter(s => s.g === cg && s.s === cs && s.name.toLowerCase().includes(q));
        const dom = document.getElementById("dom-list"); dom.innerHTML = "";
        
        list.forEach(s => {
          const key = `${cs}_${cg}_${date}`;
          const isP = db.att?.[key]?.p?.includes(s.id);
          const isPaidMonth = db.fees?.[month]?.[s.id]?.paid;
          const isPaidDay = db.att?.[key]?.daily?.[s.id] > 0;
          const stats = getStudentStats(s.id, month);
          
          let statusLabel = `<span class="badge badge-due">ABSENT</span>`;
          if(isPaidMonth) statusLabel = `<span class="badge badge-paid">MONTHLY</span>`;
          else if(isPaidDay) statusLabel = `<span class="badge badge-day">PAID DAILY</span>`;
          else if(isP) statusLabel = `<span class="badge badge-due">UNPAID (Arr: ${stats.arrears})</span>`;

          dom.innerHTML += `<div class="std-row">
            <div onclick="openProfile('${s.id}')" style="flex:1"><b>${s.name}</b><br>${statusLabel}</div>
            <input type="checkbox" style="width:24px; height:24px" ${isP ? 'checked' : ''} ${lock.locked ? 'disabled' : ''} onchange="markAtt('${s.id}', this.checked)">
          </div>`;
        });
      }

      function openProfile(id) {
        const s = db.students.find(x => x.id === id);
        const date = document.getElementById("att-date").value;
        const month = date.slice(0, 7);
        const key = `${cs}_${cg}_${date}`;
        const isPaidMonth = db.fees?.[month]?.[id]?.paid;
        const isPaidDay = db.att?.[key]?.daily?.[id] > 0;
        const mFee = db.grades[cg].mFee;
        const dFee = db.grades[cg].dFee || 250;
        const stats = getStudentStats(id, month);

        document.getElementById("p-content").innerHTML = `
          <div style="text-align:center; margin-bottom:15px;"><h3 style="margin:0;">${s.name.toUpperCase()}</h3><small>${id}</small></div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; text-align:center;">
              <div style="background:#f8fafc; padding:10px; border-radius:12px; border:1px solid #e2e8f0;"><p style="margin:0; font-size:9px;">PRESENT</p><b style="color:var(--s);">${stats.presentDays}</b></div>
              <div style="background:#0f172a; padding:10px; border-radius:12px; color:white;"><p style="margin:0; font-size:9px; opacity:0.7;">ARREARS</p><b>Rs. ${stats.arrears}</b></div>
          </div>

          ${!isPaidDay ? `
          <div class="card" style="background:${isPaidMonth ? '#f0fdf4' : '#fff'}; border:1px solid ${isPaidMonth ? '#bbf7d0' : '#e2e8f0'};">
              <p style="font-size:10px; font-weight:800; color:#4f46e5; margin:0 0 5px 0;">MONTHLY PLAN</p>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                  <span style="font-weight:700;">${isPaidMonth ? '✅ PAID' : 'PENDING'}</span>
                  <button class="btn btn-p" style="width:auto; padding:5px 10px;" onclick="payMonthly('${id}', ${!isPaidMonth})">${isPaidMonth ? 'Undo' : 'Pay Rs.' + mFee}</button>
              </div>
          </div>` : '<p style="text-align:center; font-size:11px; color:#64748b;">Monthly Payment hidden (Daily Payer)</p>'}

          ${!isPaidMonth ? `
          <div class="card" style="border-left:4px solid ${isPaidDay ? 'var(--s)' : 'var(--d)'};">
              <p style="font-size:10px; font-weight:800; color:var(--dk); margin:0 0 5px 0;">DAILY PAYMENT</p>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                  <span>${isPaidDay ? '<b style="color:var(--s)">PAID TODAY</b>' : 'Arrears: <b style="color:var(--d)">Rs. '+stats.arrears+'</b>'}</span>
                  ${!isPaidDay ? `<button class="btn btn-dk" style="width:auto; padding:5px 12px;" onclick="payDaily('${id}', ${dFee})">Pay Daily</button>` : `<button class="btn btn-dk" style="width:auto; padding:5px 12px; background:#f1f5f9; color:black" onclick="payDaily('${id}', 0)">Undo</button>`}
              </div>
          </div>` : ''}

          <div style="margin-top:20px;">
              <button class="btn btn-dk" style="background:#25d366; margin-bottom:10px;" onclick="sendAdvancedReceipt('${s.name}', '${s.ph}', '${isPaidMonth?'Monthly':'Daily'}', ${isPaidMonth?mFee:(isPaidDay?dFee:0)})">📱 WhatsApp Slip</button>
              <button class="btn btn-dk" style="background:#f1f5f9; color:#64748b;" onclick="closeOverlays()">Close</button>
          </div>`;
        document.getElementById("p-overlay").style.display = "block";
      }

      function openSummary() {
        const date = document.getElementById("att-date").value;
        const key = `${cs}_${cg}_${date}`;
        const attData = db.att?.[key] || { p: [], daily: {} };
        const mFee = db.grades[cg].mFee;
        let mTotal = 0, dTotal = 0, pCount = attData.p.length;

        let html = `<div style="text-align:center; margin-bottom:15px; border-bottom:2px solid #0f172a; padding-bottom:10px;"><h2>TEACHER SUMMARY</h2><small>${cs} | G${cg} | ${date}</small><br><b>Present: ${pCount} Students</b></div>`;
        html += `<table id="sum-table" style="width:100%; border-collapse:collapse; margin-bottom:20px;"><tr style="background:#f1f5f9; font-size:11px;"><th style="padding:8px; text-align:left;">STUDENT</th><th style="padding:8px; text-align:center;">TYPE</th><th style="padding:8px; text-align:right;">AMOUNT</th></tr>`;
        
        (db.students || []).filter(s => s.g === cg && s.s === cs).forEach(s => {
            const isPaidMonth = db.fees?.[date.slice(0, 7)]?.[s.id]?.paid;
            const dayAmt = attData.daily?.[s.id] || 0;
            if(isPaidMonth || dayAmt > 0) {
                const amt = isPaidMonth ? mFee : dayAmt;
                mTotal += (isPaidMonth ? mFee : 0); dTotal += (isPaidMonth ? 0 : dayAmt);
                html += `<tr style="border-bottom:1px solid #eee; font-size:11px;"><td style="padding:8px;">${s.name}</td><td style="padding:8px; text-align:center;">${isPaidMonth?'MONTH':'DAILY'}</td><td style="padding:8px; text-align:right;">Rs. ${amt}</td></tr>`;
            }
        });

        html += `</table>`;
        const total = mTotal + dTotal; const inst = total * 0.20; const teacher = total - inst;
        document.getElementById("sum-area").innerHTML = html;
        document.getElementById("sum-fin").innerHTML = `<div style="margin-top:15px; background:#0f172a; color:white; padding:15px; border-radius:12px;"><div style="display:flex; justify-content:space-between; font-size:12px;"><span>Gross: Rs. ${total}</span><span>Inst (20%): -${inst.toFixed(0)}</span></div><div style="display:flex; justify-content:space-between; border-top:1px solid #334155; padding-top:10px; margin-top:10px;"><span style="font-weight:800;">TEACHER NET:</span><span style="font-weight:800; color:#10b981; font-size:18px;">Rs. ${teacher.toFixed(0)}</span></div></div>`;
        document.getElementById("s-overlay").style.display = "block";
      }

      function renderMonthlyReport() {
        const month = document.getElementById("rep-month").value || new Date().toISOString().slice(0, 7);
        document.getElementById("rep-month").value = month;
        let html = `<table style="width:100%; border-collapse:collapse; font-size:10px; margin-top:10px;"><tr style="background:#0f172a; color:white;">
            <th style="padding:5px;">Student</th><th style="padding:5px;">Att.</th><th style="padding:5px;">Status</th><th style="padding:5px;">Arrears</th></tr>`;
        
        (db.students || []).filter(s => s.g === cg && s.s === cs).forEach(s => {
            const stats = getStudentStats(s.id, month);
            const isMonthly = db.fees?.[month]?.[s.id]?.paid;
            html += `<tr style="border-bottom:1px solid #e2e8f0;">
                <td style="padding:8px;">${s.name}</td>
                <td style="padding:8px; text-align:center;">${stats.presentDays}</td>
                <td style="padding:8px; text-align:center;">${isMonthly ? '✅ MONTH' : (stats.paidDays > 0 ? '📅 DAILY' : '❌ DUE')}</td>
                <td style="padding:8px; text-align:right; color:${stats.arrears>0?'red':'black'}">Rs. ${stats.arrears}</td>
            </tr>`;
        });
        html += `</table>`;
        document.getElementById("monthly-report-area").innerHTML = html;
      }

      function saveSchedule() {
        if(!db.schedules) db.schedules = {};
        db.schedules[`${cg}_${cs}`] = {
            day: document.getElementById("sch-day").value,
            start: document.getElementById("sch-start").value,
            dur: parseFloat(document.getElementById("sch-dur").value)
        };
        save(); alert("Schedule Saved!");
      }

      function loadSchedule() {
        const sched = db.schedules?.[`${cg}_${cs}`];
        if(sched) {
            document.getElementById("sch-day").value = sched.day;
            document.getElementById("sch-start").value = sched.start;
            document.getElementById("sch-dur").value = sched.dur;
        }
      }

      function payDaily(id, amt) {
        const k = `${cs}_${cg}_${document.getElementById("att-date").value}`;
        if(!db.att[k]) db.att[k] = { p: [] }; if(!db.att[k].daily) db.att[k].daily = {};
        db.att[k].daily[id] = amt; save(); render(); openProfile(id);
      }

      function register() {
        const nInput = document.getElementById("reg-n");
        const phInput = document.getElementById("reg-ph");
        if(!nInput.value || !phInput.value) return alert("Fill all fields");
        if(!db.students) db.students = [];
        db.students.push({ id: `S-${Date.now().toString().slice(-4)}`, name: nInput.value, ph: phInput.value, g: cg, s: cs, joined: new Date().toLocaleDateString() });
        save(); alert("Enrolled!"); nInput.value = ""; phInput.value = ""; setTab('att');
      }

      function markAtt(id, val) {
        const k = `${cs}_${cg}_${document.getElementById("att-date").value}`;
        if(!db.att[k]) db.att[k] = { p: [] };
        if(val) { if(!db.att[k].p.includes(id)) db.att[k].p.push(id); }
        else { db.att[k].p = db.att[k].p.filter(i => i !== id); }
        save(); render();
      }

      function payMonthly(id, st) {
        const m = document.getElementById("att-date").value.slice(0, 7);
        if(!db.fees) db.fees = {}; if(!db.fees[m]) db.fees[m] = {};
        db.fees[m][id] = { paid: st, date: document.getElementById("att-date").value };
        save(); openProfile(id);
      }

      function addNewGrade() { 
        const n = prompt("Grade:"); 
        const f = prompt("Monthly Fee:", "1000"); 
        const df = prompt("Daily Fee:", "250");
        if(n) { if(!db.grades) db.grades = {}; db.grades[n] = { mFee: parseInt(f), dFee: parseInt(df) }; save(); } 
      }
      function closeOverlays() { document.getElementById("p-overlay").style.display="none"; document.getElementById("s-overlay").style.display="none"; render(); }
      function exportData() { const b = new Blob([JSON.stringify(db)], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Sipsayura_Backup.json`; a.click(); }

      function sendAdvancedReceipt(n, ph, type, amt) {
        const msg = `*SIPSAYURA INSTITUTE*%0A*OFFICIAL RECEIPT*%0A*STUDENT:* ${n.toUpperCase()}%0A*CLASS:* Grade ${cg} ${cs}%0A*DATE:* ${document.getElementById("att-date").value}%0A*PAYMENT:* ${type}%0A*AMOUNT:* Rs. ${amt}.00%0A*STATUS:* PAID ✅`;
        window.open(`https://wa.me/94${ph.substring(1)}?text=${msg}`);
      }

      function printReport() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(18); doc.text("TEACHER DAILY SUMMARY", 105, 15, null, null, "center");
        doc.setFontSize(10); doc.text(`Subject: ${cs} | Grade: ${cg} | Date: ${document.getElementById("att-date").value}`, 105, 22, null, null, "center");
        doc.autoTable({ html: '#sum-table', startY: 30, theme: 'grid' });
        doc.text(document.getElementById("sum-fin").innerText, 14, doc.lastAutoTable.finalY + 10);
        doc.save(`Daily_Report_${cs}_${cg}.pdf`);
      }
    </script>
  </body>
</html>
