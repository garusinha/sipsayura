<script>
  const firebaseConfig = {
    apiKey: "AIzaSyARz6yYnI8d2KR6wWl--PT6nEnVikSplms",
    authDomain: "sipsayura-96757.firebaseapp.com",
    databaseURL: "https://sipsayura-96757-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sipsayura-96757",
    storageBucket: "sipsayura-96757.firebasestorage.app",
    messagingSenderId: "148140063507",
    appId: "1:148140063507:web:41a1046fa7aea4885238e6"
  };
  
  firebase.initializeApp(firebaseConfig);
  const rdb = firebase.database();
  let db = { students: [], att: {}, grades: {}, subs: ["MATH","SCI","SIN","ENG"], fees: {}, schedules: {} };
  let cg = "", cs = "";

  function checkLogin() {
    if(document.getElementById("master-pin").value === "9988") {
        sessionStorage.setItem("auth_sip", "true");
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        initApp();
    } else { alert("Wrong PIN"); }
  }

  if(sessionStorage.getItem("auth_sip") === "true") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-content").style.display = "block";
    initApp();
  }

  function initApp() { 
    rdb.ref('sip_v36').on('value', (s) => { 
        if(s.val()) { 
            db = s.val(); 
            if(!db.students) db.students = [];
            if(!db.fees) db.fees = {};
            if(!db.att) db.att = {};
            refreshUI(); 
            render(); 
        } 
    }); 
  }

  const save = () => rdb.ref('sip_v36').set(db);

  function refreshUI() {
    if(document.getElementById('v-grades').style.display !== 'none') {
        const d = document.getElementById("dom-grades"); d.innerHTML = "";
        Object.keys(db.grades || {}).forEach(g => {
            const count = (db.students || []).filter(s => s.g.toString() === g.toString()).length;
            d.innerHTML += `<div class="grade-card" onclick="selG('${g}')"><span class="count-badge">${count} Std</span><h3>Grade ${g}</h3></div>`;
        });
    }
  }

  function selG(g) { cg = g; document.getElementById("lbl-grade").innerText = "Grade " + g; showV("v-subs"); initSubs(); }
  function initSubs() {
    const d = document.getElementById("dom-subs"); d.innerHTML = "";
    (db.subs || []).forEach(s => { d.innerHTML += `<div class="grade-card" onclick="enter('${s}')"><h3>${s}</h3></div>`; });
  }
  function enter(s) { cs = s; showV("v-dash"); document.getElementById("app-nav").style.display = "flex"; setTab('att', document.querySelector(".nav-btn")); }
  function showV(id) { ["v-grades", "v-subs", "v-dash"].forEach(v => document.getElementById(v).style.display = "none"); document.getElementById(id).style.display = "block"; }

  function setTab(t, el) {
    if(t === 'set' && prompt("Admin PIN:") !== "2705") return;
    ["att", "reg", "set", "sch", "rep"].forEach(i => document.getElementById("tab-" + i).style.display = "none");
    document.getElementById("tab-" + t).style.display = "block";
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    if (el) el.classList.add("active"); 
    if(t === 'sch') loadSchedule();
    render();
  }

  function markAtt(id, val) {
    const date = document.getElementById("att-date").value;
    const key = `${cs}_${cg}_${date}`;
    if(!db.att) db.att = {};
    if(!db.att[key]) db.att[key] = { p: [], daily: {} };
    
    if(val) {
        if(!db.att[key].p.includes(id)) db.att[key].p.push(id);
    } else {
        db.att[key].p = db.att[key].p.filter(item => item !== id);
    }
    save();
  }

  function render() {
    const date = document.getElementById("att-date").value || new Date().toISOString().split('T')[0];
    document.getElementById("att-date").value = date;
    const q = document.getElementById("att-q").value.toLowerCase();
    const month = date.slice(0, 7);
    const key = `${cs}_${cg}_${date}`;
    
    const list = (db.students || []).filter(s => s.g.toString() === cg.toString() && s.s.toString() === cs.toString() && s.name.toLowerCase().includes(q));
    const dom = document.getElementById("dom-list"); dom.innerHTML = "";
    
    const lock = checkLock();
    document.getElementById("lock-banner").innerHTML = `<div class="lock-msg" style="background:${lock.ok?'#f0fdf4':'#fff1f2'}; color:${lock.ok?'#166534':'#991b1b'}">${lock.msg}</div>`;

    list.forEach(s => {
      const isP = db.att?.[key]?.p?.includes(s.id);
      const isPM = db.fees?.[month]?.[s.id]?.paid;
      const isPD = db.att?.[key]?.daily?.[s.id] > 0;
      
      let st = `<span class="badge badge-due">ABSENT</span>`;
      if(isPM) st = `<span class="badge badge-paid">MONTHLY</span>`;
      else if(isPD) st = `<span class="badge badge-day">PAID DAY</span>`;
      else if(isP) st = `<span class="badge" style="background:#e0e7ff; color:#3730a3">PRESENT</span>`;

      dom.innerHTML += `<div class="std-row">
        <div onclick="openProfile('${s.id}')" style="flex:1"><b>${s.name.toUpperCase()}</b><br>${st}</div>
        <input type="checkbox" style="width:22px; height:22px" ${isP ? 'checked' : ''} onchange="markAtt('${s.id}', this.checked)">
      </div>`;
    });
  }

  function checkLock() {
    const s = db.schedules?.[`${cg}_${cs}`];
    if(!s) return { ok: true, msg: "No schedule set" };
    const now = new Date();
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    if(document.getElementById("att-date").value !== now.toISOString().split('T')[0]) return { ok: true, msg: "Viewing History" };
    if(days[now.getDay()] !== s.day) return { ok: false, msg: "Wrong Day" };
    return { ok: true, msg: "Class Time Active" };
  }

  function openProfile(id) {
    const s = db.students.find(x => x.id === id);
    const date = document.getElementById("att-date").value;
    const month = date.slice(0, 7);
    const key = `${cs}_${cg}_${date}`;
    
    // Safety checks for nested data
    const isPM = db.fees?.[month]?.[id]?.paid || false;
    const isPD = (db.att?.[key]?.daily?.[id] > 0) || false;
    
    const mFee = db.grades[cg]?.mFee || 1000;
    const dFee = 250;

    document.getElementById("p-content").innerHTML = `
      <h3>${s.name.toUpperCase()}</h3>
      <div class="card">
        <p>Monthly Status: <b>${isPM ? 'PAID' : 'DUE'}</b></p>
        <button class="btn btn-p" onclick="payM('${id}', ${!isPM})">${isPM ? 'Undo Payment' : 'Pay Rs.'+mFee}</button>
      </div>
      <div class="card">
        <p>Daily Status: <b>${isPD ? 'PAID' : 'DUE'}</b></p>
        <button class="btn btn-dk" onclick="payD('${id}', ${isPD ? 0 : dFee})">${isPD ? 'Undo Payment' : 'Pay Rs.'+dFee}</button>
      </div>
      <button class="btn btn-dk" style="margin-top:10px;" onclick="closeOverlays()">Close</button>`;
    document.getElementById("p-overlay").style.display = "block";
  }

  function payD(id, amt) {
    const date = document.getElementById("att-date").value;
    const k = `${cs}_${cg}_${date}`;
    
    if(!db.att) db.att = {};
    if(!db.att[k]) db.att[k] = { p: [], daily: {} };
    if(!db.att[k].daily) db.att[k].daily = {};

    if(amt === 0) {
        delete db.att[k].daily[id];
    } else {
        db.att[k].daily[id] = amt;
        // Auto-mark as present if paying daily
        if(!db.att[k].p.includes(id)) db.att[k].p.push(id);
    }
    
    save();
    openProfile(id); // Refresh modal
  }

  function payM(id, st) {
    const m = document.getElementById("att-date").value.slice(0, 7);
    if(!db.fees) db.fees = {};
    if(!db.fees[m]) db.fees[m] = {};
    
    db.fees[m][id] = { paid: st };
    
    save();
    openProfile(id); // Refresh modal
  }

  function openSummary() {
    const date = document.getElementById("att-date").value;
    const key = `${cs}_${cg}_${date}`;
    const attData = db.att?.[key] || { p: [], daily: {} };
    const mFee = db.grades[cg]?.mFee || 1000;
    let total = 0;
    
    let html = `<h3>Teacher Summary - ${date}</h3><table id="sum-table" style="width:100%; border-collapse:collapse;">`;
    html += `<tr style="background:#eee;"><th>Student</th><th>Status</th><th>Amt</th></tr>`;
    
    (db.students || []).filter(s => s.g.toString() === cg.toString() && s.s.toString() === cs.toString()).forEach(s => {
        const isPM = db.fees?.[date.slice(0, 7)]?.[s.id]?.paid;
        const isPD = attData.daily?.[s.id] || 0;
        const isP = attData.p?.includes(s.id);
        let st = "", amt = 0, color = "black";
        
        if(isPM) { st = "MONTHLY"; amt = mFee; }
        else if(isPD > 0) { st = "DAILY"; amt = isPD; }
        else if(isP) { st = "PRESENT (NOT PAID)"; color = "red"; }
        
        if(st !== "") {
            html += `<tr style="color:${color}; border-bottom:1px solid #ddd;"><td>${s.name}</td><td>${st}</td><td>${amt}</td></tr>`;
            total += amt;
        }
    });
    html += `</table>`;
    document.getElementById("sum-area").innerHTML = html;
    document.getElementById("sum-fin").innerHTML = `<h4>Net: Rs. ${(total * 0.8).toFixed(0)} (After 20%)</h4>`;
    document.getElementById("s-overlay").style.display = "block";
  }

  function register() {
    const n = document.getElementById("reg-n").value;
    const p = document.getElementById("reg-ph").value;
    if(!n || !p) return alert("Fill all");
    db.students.push({ id: "S"+Date.now(), name: n, ph: p, g: cg.toString(), s: cs.toString() });
    save(); alert("Enrolled"); document.getElementById("reg-n").value = ""; document.getElementById("reg-ph").value = ""; setTab('att');
  }
  function addNewGrade() { const n = prompt("Grade:"); if(n) { if(!db.grades) db.grades = {}; db.grades[n] = { mFee: 1000 }; save(); } }
  function saveSchedule() { if(!db.schedules) db.schedules = {}; db.schedules[`${cg}_${cs}`] = { day: document.getElementById("sch-day").value, start: document.getElementById("sch-start").value, dur: document.getElementById("sch-dur").value }; save(); alert("Saved"); }
  function loadSchedule() { const s = db.schedules?.[`${cg}_${cs}`]; if(s) { document.getElementById("sch-day").value = s.day; document.getElementById("sch-start").value = s.start; document.getElementById("sch-dur").value = s.dur; } }
  function closeOverlays() { document.querySelectorAll(".overlay").forEach(o => o.style.display="none"); render(); }
  function exportData() { const b = new Blob([JSON.stringify(db)], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Sipsayura.json`; a.click(); }
  function printReport() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("Daily Summary", 10, 10); doc.autoTable({ html: '#sum-table', startY: 20 }); doc.save('Report.pdf'); }
</script>
